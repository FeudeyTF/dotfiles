$touchpad = elan050a:01-04f3:3158-touchpad
$wired = beken-usb-gaming-mouse
$wireless = beken-2.4g-wireless-device

# Touchpad
device {
	name = $touchpad
	sensitivity = 0.20
}

# Wired mouse
device {
	name = $wired-1
	sensitivity = -0.75
}
device {
	name = $wired-2
	sensitivity = -0.75
}

# Wireless mouse
device {
	name = $wireless-1
	sensitivity = -0.75
}
device {
	name = $wireless-2
	sensitivity = -0.75
}
